services:
  # ── Base de datos PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: proyecto_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_password}
      POSTGRES_DB: ${DB_DATABASE:-proyecto_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_DATABASE:-proyecto_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  # ── Keycloak ──────────────────────────────────────────────────────────────
  keycloak:
    image: keycloak/keycloak:26.0
    container_name: proyecto_keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8090
    ports:
      - "8090:8090"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8090 && echo -e 'GET /realms/curso-springboot HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q 'realm' <&3"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - app-network

  # ── Aplicación Spring Boot ────────────────────────────────────────────────
  backend:
    build: ./spring-backend
    container_name: proyecto_spring_backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_DATABASE:-proyecto_db}
      DB_USERNAME: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres_password}
      JPA_DDL: update
      KEYCLOAK_JWK_SET_URI: http://keycloak:8090/realms/curso-springboot/protocol/openid-connect/certs
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
