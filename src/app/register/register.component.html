<app-header></app-header>

<main class="bg-white py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-5">
            <h2 class="text-center mb-2 fw-bold">Crear cuenta</h2>
            <p class="text-center text-muted mb-4">Regístrate para acceder a NumTech Academy</p>

            <!-- Mensaje de Error -->
            <div *ngIf="errorMessage" class="alert alert-danger p-2 mb-3 text-center small rounded-3" role="alert">
              <i class="fas fa-exclamation-circle me-1"></i> {{ errorMessage }}
            </div>

            <!-- Mensaje de Éxito -->
            <div *ngIf="successMessage" class="alert alert-success p-2 mb-3 text-center small rounded-3" role="alert">
              <i class="fas fa-check-circle me-1"></i> {{ successMessage }}
            </div>

            <!-- Nombre -->
            <div class="mb-3">
              <label for="nombre" class="form-label fw-semibold">Nombre completo</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                <input 
                  type="text" id="nombre" class="form-control border-start-0" 
                  placeholder="Juan Pérez"
                  [(ngModel)]="nombre" [disabled]="isLoading" required
                />
              </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="form-label fw-semibold">Correo electrónico</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                <input 
                  type="email" id="email" class="form-control border-start-0" 
                  placeholder="ejemplo@numtech.com"
                  [(ngModel)]="email" [disabled]="isLoading" required
                />
              </div>
            </div>

            <!-- Rol -->
            <div class="mb-3">
              <label for="rol" class="form-label fw-semibold">Tipo de cuenta</label>
              <select id="rol" class="form-select" [(ngModel)]="rol" [disabled]="isLoading">
                <option value="estudiante">Estudiante</option>
                <option value="profesor">Profesor</option>
              </select>
            </div>

            <!-- Contraseña -->
            <div class="mb-3">
              <label for="password" class="form-label fw-semibold">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                <input 
                  type="password" id="password" class="form-control border-start-0" 
                  placeholder="Mínimo 6 caracteres"
                  [(ngModel)]="password" [disabled]="isLoading" required
                />
              </div>
            </div>

            <!-- Confirmar Contraseña -->
            <div class="mb-4">
              <label for="confirmPassword" class="form-label fw-semibold">Confirmar contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                <input 
                  type="password" id="confirmPassword" class="form-control border-start-0" 
                  placeholder="Repite tu contraseña"
                  [(ngModel)]="confirmPassword" [disabled]="isLoading" required
                  (keyup.enter)="registrarse()"
                />
              </div>
            </div>

            <!-- Botón de Registro -->
            <button 
              class="btn btn-cafe w-100 py-2 fw-bold d-flex align-items-center justify-content-center gap-2" 
              (click)="registrarse()" [disabled]="isLoading"
            >
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status"></span>
              {{ isLoading ? 'Creando cuenta...' : 'Registrarse' }}
            </button>

            <!-- Link al login -->
            <p class="text-center mt-3 mb-0 small">
              ¿Ya tienes una cuenta? <a routerLink="/login" class="fw-semibold text-decoration-none" style="color: #8B4513;">Inicia sesión aquí</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="footer mt-auto py-4 bg-dark text-white">
  <div class="container">
    <div class="row">
      <div class="col-md-4 mb-3">
        <div class="d-flex align-items-center gap-2">
          <i class="fas fa-graduation-cap fa-2x"></i>
          <span class="fs-4">NumTech Academy</span>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <h5>Redes sociales</h5>
        <div class="d-flex gap-3">
          <a href="#" class="text-white fs-3"><i class="fab fa-facebook"></i></a>
          <a href="#" class="text-white fs-3"><i class="fab fa-twitter"></i></a>
          <a href="#" class="text-white fs-3"><i class="fab fa-instagram"></i></a>
          <a href="#" class="text-white fs-3"><i class="fab fa-linkedin"></i></a>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <h5>Contacto</h5>
        <p>Tel: +1 222 333 4444<br>Email: info@numtechacademy.com<br>Dir: Calle Falsa 123, Ciudad</p>
      </div>
    </div>
  </div>
</footer>
