<app-header></app-header>

<!-- Contenido principal -->
<main class="bg-white py-5">
  <div class="container">
    <h1 class="text-center mb-5 fw-bold">Nuestro equipo</h1>
    <div class="row gy-4">
      <div *ngFor="let dev of developers; let i = index" class="col-12">
        <div class="developer-card p-4">
          <div class="row align-items-center">
            <!-- Imagen izquierda si índice par -->
            <div *ngIf="i % 2 === 0" class="col-md-3 text-center mb-3 mb-md-0">
              <img src="https://via.placeholder.com/150/cccccc/666666?text=Avatar" class="img-fluid rounded-circle" style="max-width: 120px;">
            </div>
            <div class="col-md-9">
              <h3 class="fw-bold">{{ dev.name }}</h3>
              <p *ngIf="dev.id"><strong>ID:</strong> {{ dev.id }}</p>
              <p *ngIf="dev.email"><strong>Email:</strong> {{ dev.email }}</p>
              <p *ngIf="!dev.id && !dev.email" class="text-muted">Desarrollador</p>
            </div>
            <!-- Imagen derecha si índice impar -->
            <div *ngIf="i % 2 !== 0" class="col-md-3 text-center mt-3 mt-md-0">
              <img src="https://via.placeholder.com/150/cccccc/666666?text=Avatar" class="img-fluid rounded-circle" style="max-width: 120px;">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<!-- Footer (idéntico al del Home) -->
<footer class="footer mt-auto py-4 bg-dark text-white">
  <div class="container">
    <div class="row">
      <div class="col-md-4 mb-3">
        <div class="d-flex align-items-center gap-2">
          <i class="fas fa-graduation-cap fa-2x"></i>
          <span class="fs-4">NumTech Academy</span>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <h5>Redes sociales</h5>
        <div class="d-flex gap-3">
          <a href="#" class="text-white fs-3"><i class="fab fa-facebook"></i></a>
          <a href="#" class="text-white fs-3"><i class="fab fa-twitter"></i></a>
          <a href="#" class="text-white fs-3"><i class="fab fa-instagram"></i></a>
          <a href="#" class="text-white fs-3"><i class="fab fa-linkedin"></i></a>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <h5>Contacto</h5>
        <p>Tel: +1 222 333 4444<br>Email: info@numtechacademy.com<br>Dir: Calle Falsa 123, Ciudad</p>
      </div>
    </div>
  </div>
</footer>
