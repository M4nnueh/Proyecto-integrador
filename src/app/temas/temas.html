<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="display-5 fw-bold text-primary">
      <i class="fas fa-book-open me-2"></i> Gestión de Temas
    </h1>
    <a routerLink="/" class="btn btn-outline-secondary">
      <i class="fas fa-arrow-left me-2"></i> Volver al Inicio
    </a>
  </div>

  <div class="row">
    <!-- Formulario para agregar un tema -->
    <div class="col-md-4 mb-4">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">Añadir Nuevo Tema</h5>
        </div>
        <div class="card-body bg-light">
          <div class="mb-3">
            <label class="form-label fw-bold">Título del Tema</label>
            <input type="text" class="form-control" [ngModel]="nuevoTitulo()" (ngModelChange)="nuevoTitulo.set($event)" placeholder="Ej. Bisección">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Descripción</label>
            <textarea class="form-control" rows="3" [ngModel]="nuevaDescripcion()" (ngModelChange)="nuevaDescripcion.set($event)" placeholder="Breve explicación del método..."></textarea>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Biblioteca (Archivo C)</label>
            <select class="form-select" [ngModel]="nuevaBiblioteca()" (ngModelChange)="nuevaBiblioteca.set($event)">
              <option value="" disabled selected>Selecciona un archivo...</option>
              <option value="Biseccion.c">Biseccion.c</option>
              <option value="binarios.c">binarios.c</option>
              <option value="newton.c">newton.c</option>
              <option value="redondeo.c">redondeo.c</option>
              <option value="taylor.c">taylor.c</option>
            </select>
          </div>
          <button class="btn btn-primary w-100" (click)="crearTema()" [disabled]="!nuevoTitulo().trim() || !nuevaDescripcion().trim()">
            Guardar Tema
          </button>
        </div>
      </div>
    </div>

    <!-- Lista de temas -->
    <div class="col-md-8">
      <div class="row g-4">
        <div class="col-12" *ngFor="let tema of temas()">
          <div class="card shadow-sm border-0 h-100 tema-card">
            <div class="card-body d-flex flex-column">
              <div class="d-flex justify-content-between align-items-start">
                <h4 class="card-title fw-bold text-dark">{{ tema.titulo }}</h4>
                <button class="btn btn-sm btn-outline-danger" (click)="eliminarTema(tema.id)" title="Eliminar">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
              <p class="card-text text-secondary mt-2 flex-grow-1">{{ tema.descripcion }}</p>
              <div class="mt-3 pt-3 border-top d-flex align-items-center text-muted small">
                <i class="fas fa-file-code me-2 text-info"></i>
                <span>Implementación: <strong>{{ tema.biblioteca }}</strong></span>
              </div>
            </div>
          </div>
        </div>
        
        <div *ngIf="temas().length === 0" class="col-12">
          <div class="alert alert-info" role="alert">
            No hay temas registrados. Añade uno desde el formulario.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
