<div class="container py-5">
  <button (click)="volver()" class="btn btn-outline-secondary mb-4">
    <i class="fas fa-arrow-left me-2"></i> Volver a Temas
  </button>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
  </div>

  <div *ngIf="error" class="alert alert-danger" role="alert">
    Error al cargar el tema. Por favor, intenta de nuevo.
  </div>

  <div *ngIf="tema" class="card shadow-sm border-0">
    <div class="card-header bg-primary text-white py-3">
      <h2 class="mb-0">{{ tema.titulo }}</h2>
    </div>
    <div class="card-body p-4 p-md-5">
      <div class="tema-content" [innerHTML]="tema.descripcion"></div>
    </div>
  </div>
</div>
