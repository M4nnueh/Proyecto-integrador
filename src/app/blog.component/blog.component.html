<app-header></app-header>

<main class="bg-white py-5">
  <div class="container">
    <!-- Título principal -->
    <h1 class="display-3 fw-bold text-center mb-5">Noticias nuevas</h1>

    <!-- Noticia principal (primicia) -->
    <div class="row mb-5">
      <div class="col-12">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
          <div class="row g-0">
            <div class="col-md-5">
              <img [src]="mainNews.image" class="img-fluid h-100 object-fit-cover" alt="Imagen principal">
            </div>
            <div class="col-md-7">
              <div class="card-body p-4">
                <h2 class="card-title fw-bold">{{ mainNews.title }}</h2>
                <p class="card-text text-muted mb-2">{{ mainNews.date }}</p>
                <p class="card-text fs-5">{{ mainNews.summary }}</p>
                <a href="#" class="btn btn-cafe mt-2">Leer más →</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Subtítulo para las columnas -->
    <h2 class="display-6 fw-semibold mb-4">Más noticias</h2>

    <!-- Tres columnas de noticias secundarias -->
    <div class="row g-4">
      <div class="col-md-4" *ngFor="let news of secondaryNews">
        <div class="card h-100 border-0 shadow-sm rounded-4">
          <img [src]="news.image" class="card-img-top rounded-top-4" style="height: 200px; object-fit: cover;" alt="Imagen noticia">
          <div class="card-body">
            <h5 class="card-title fw-bold">{{ news.title }}</h5>
            <p class="card-text text-muted small">{{ news.date }}</p>
            <p class="card-text">{{ news.summary }}</p>
            <a href="#" class="btn btn-outline-cafe btn-sm">Leer más</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Footer (idéntico) -->
<footer class="footer mt-auto py-4 bg-dark text-white">
  <div class="container">
    <div class="row">
      <div class="col-md-4 mb-3">
        <div class="d-flex align-items-center gap-2">
          <i class="fas fa-graduation-cap fa-2x"></i>
          <span class="fs-4">NumTech Academy</span>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <h5>Redes sociales</h5>
        <div class="d-flex gap-3">
          <a href="#" class="text-white fs-3"><i class="fab fa-facebook"></i></a>
          <a href="#" class="text-white fs-3"><i class="fab fa-twitter"></i></a>
          <a href="#" class="text-white fs-3"><i class="fab fa-instagram"></i></a>
          <a href="#" class="text-white fs-3"><i class="fab fa-linkedin"></i></a>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <h5>Contacto</h5>
        <p>Tel: +1 222 333 4444<br>Email: info@numtechacademy.com<br>Dir: Calle Falsa 123, Ciudad</p>
      </div>
    </div>
  </div>
</footer>
