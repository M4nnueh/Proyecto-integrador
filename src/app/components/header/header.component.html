<header class="header">
  <div class="container d-flex justify-content-between align-items-center py-3">
    <div class="d-flex align-items-center gap-2">
      <i class="fas fa-graduation-cap fa-2x"></i>
      <span class="fs-3 fw-semibold">NumTech Academy</span>
    </div>
    <nav class="d-flex gap-3 align-items-center flex-wrap">
      <a routerLink="/home" class="nav-link">Inicio</a>
      <a routerLink="/nosotros" class="nav-link">Nosotros</a>
      <div class="dropdown">
        <a class="nav-link dropdown-toggle" href="#" role="button" id="cursosDropdown" data-bs-toggle="dropdown" aria-expanded="false">Cursos</a>
        <ul class="dropdown-menu" aria-labelledby="cursosDropdown">
          <li><a routerLink="/curso/taylor" class="dropdown-item">Polinomio de Taylor</a></li>
          <li><a routerLink="/curso/ecuacion-1var" class="dropdown-item">Ecuaciones de 1 variable</a></li>
          <li><a routerLink="/curso/aproximacion" class="dropdown-item">Aproximación de un polinomio</a></li>
        </ul>
      </div>
      <a routerLink="/anuncios" class="nav-link">Anuncios</a>
      <a routerLink="/blog" class="nav-link">Blog</a>
      <a routerLink="/evaluar" class="nav-link">Evaluar</a>

      <!-- Estado NO logueado -->
      <a *ngIf="!currentUser" routerLink="/login" class="btn btn-danger ms-2">Iniciar sesión</a>

      <!-- Estado LOGUEADO -->
      <div *ngIf="currentUser" class="dropdown ms-2">
        <button class="btn btn-outline-dark dropdown-toggle d-flex align-items-center gap-2" 
                type="button" 
                id="userDropdown" 
                data-bs-toggle="dropdown" 
                aria-expanded="false"
                (click)="toggleDropdown()">
          <i class="fas fa-user-circle"></i>
          <span>{{ currentUser.nombre }}</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
          <li>
            <div class="dropdown-item text-muted small">
              Rol: {{ currentUser.rol }}
            </div>
          </li>
          <li><hr class="dropdown-divider"></li>
          <li><button class="dropdown-item" (click)="goToDashboard()">Mi Dashboard</button></li>
          <li><button class="dropdown-item text-danger" (click)="logout()">Cerrar sesión</button></li>
        </ul>
      </div>

    </nav>
  </div>
</header>
