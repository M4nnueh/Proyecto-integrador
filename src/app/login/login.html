<app-header></app-header>

<main class="bg-white py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-5">
            <h2 class="text-center mb-4 fw-bold">Iniciar sesión</h2>
            <p class="text-center text-muted mb-4">Ingresa tus credenciales para acceder</p>
            
            <!-- Mensaje de Error -->
            <div *ngIf="errorMessage" class="alert alert-danger p-2 mb-3 text-center small rounded-3" role="alert">
              <i class="fas fa-exclamation-circle me-1"></i> {{ errorMessage }}
            </div>

            <!-- Campo de Email -->
            <div class="mb-3">
              <label for="email" class="form-label fw-semibold">Correo electrónico</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                <input 
                  type="email" 
                  id="email" 
                  class="form-control border-start-0" 
                  placeholder="ejemplo@numtech.com" 
                  [(ngModel)]="email"
                  [disabled]="isLoading"
                  required
                />
              </div>
            </div>

            <!-- Campo de Contraseña -->
            <div class="mb-4">
              <label for="password" class="form-label fw-semibold">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                <input 
                  type="password" 
                  id="password" 
                  class="form-control border-start-0" 
                  placeholder="••••••••" 
                  [(ngModel)]="password"
                  [disabled]="isLoading"
                  required
                  (keyup.enter)="accederDashboard()"
                />
              </div>
            </div>

            <!-- Botón de Acceso -->
            <button 
              class="btn btn-cafe w-100 py-2 fw-bold d-flex align-items-center justify-content-center gap-2" 
              (click)="accederDashboard()"
              [disabled]="isLoading"
            >
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
              {{ isLoading ? 'Iniciando sesión...' : 'Ingresar' }}
            </button>

            <!-- Link al registro -->
            <p class="text-center mt-3 mb-0 small">
              ¿No tienes una cuenta? <a routerLink="/register" class="fw-semibold text-decoration-none" style="color: #8B4513;">Regístrate aquí</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="footer mt-auto py-4 bg-dark text-white">
  <div class="container">
    <div class="row">
      <div class="col-md-4 mb-3">
        <div class="d-flex align-items-center gap-2">
          <i class="fas fa-graduation-cap fa-2x"></i>
          <span class="fs-4">NumTech Academy</span>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <h5>Redes sociales</h5>
        <div class="d-flex gap-3">
          <a href="#" class="text-white fs-3"><i class="fab fa-facebook"></i></a>
          <a href="#" class="text-white fs-3"><i class="fab fa-twitter"></i></a>
          <a href="#" class="text-white fs-3"><i class="fab fa-instagram"></i></a>
          <a href="#" class="text-white fs-3"><i class="fab fa-linkedin"></i></a>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <h5>Contacto</h5>
        <p>Tel: +1 222 333 4444<br>Email: info@numtechacademy.com<br>Dir: Calle Falsa 123, Ciudad</p>
      </div>
    </div>
  </div>
</footer>
